[build]
builder      = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand            = "npx prisma db push && npx tsx prisma/seed.ts; node .next/standalone/server.js"
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 5

[healthcheck]
path    = "/api/health"
timeout = 30

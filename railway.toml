[build]
builder      = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand            = "cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public; node .next/standalone/server.js"
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 5

[healthcheck]
path    = "/api/health"
timeout = 30

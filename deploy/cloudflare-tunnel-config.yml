# Cloudflare Tunnel 설정 파일
# 파일 위치: ~/.cloudflared/config.yml
#
# 이 파일은 Railway 앱을 외부에 노출하는 터널 설정입니다.
# Railway 앱의 실제 IP는 완전히 숨겨지고
# Cloudflare 네트워크를 통해서만 접근 가능합니다.

tunnel: <YOUR_TUNNEL_ID>       # cloudflared tunnel create signalx 실행 후 발급
credentials-file: /root/.cloudflared/<YOUR_TUNNEL_ID>.json

ingress:
  # 유저 포털 (외부 제보자용)
  - hostname: signalx.global
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false

  # 어드민 포털 (내부 운영팀 전용)
  # 별도 서브도메인으로 완전 분리
  - hostname: admin.signalx.global
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
      # 어드민은 특정 IP에서만 접근 (추가 보안)
      # httpHostHeader: "admin.signalx.global"

  # Health check (Railway 내부용)
  - hostname: health.signalx.global
    service: http://localhost:3000/api/health

  # 나머지 요청 모두 차단
  - service: http_status:404
